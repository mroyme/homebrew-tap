name: autofix

on:
  issue_comment:
    types:
      - created

jobs:
  autofix:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/autofix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUTOFIX_APP_ID }}
          private-key: ${{ secrets.AUTOFIX_APP_PRIVATE_KEY }}

      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_repo', pr.data.head.repo.full_name);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('is_fork', pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`);

      - name: Refuse fork PRs
        if: steps.pr.outputs.is_fork == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '`/autofix` is not supported on fork PRs. Please run `brew style --fix` locally and push the result.',
            });
            core.setFailed('Fork PRs are not supported.');

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Look up app bot user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "id=${user_id}" >> "$GITHUB_OUTPUT"

      - name: Configure git as app
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_USER_ID: ${{ steps.app-user.outputs.id }}
        run: |
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Check out PR branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_REPO: ${{ steps.pr.outputs.head_repo }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          git clone --depth=1 --branch "$HEAD_REF" \
            "https://x-access-token:${GH_TOKEN}@github.com/${HEAD_REPO}.git" tap

      - name: Run brew style --fix
        working-directory: tap
        run: brew style --fix .

      - name: Commit and push fixes
        id: commit
        working-directory: tap
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No style fixes to apply."
            exit 0
          fi
          git add -A
          git commit -m "style: apply \`brew style --fix\` via /autofix"
          git push origin "HEAD:${HEAD_REF}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const changed = '${{ steps.commit.outputs.changed }}' === 'true';
            const body = changed
              ? 'Applied `brew style --fix` and pushed the fixes to this branch.'
              : 'Ran `brew style --fix`; nothing to change.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
